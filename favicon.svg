<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo azul com cantos arredondados (app icon style) -->
  <rect width="100" height="100" rx="22" fill="#0100FE"/>
  <!-- Forma branca central -->
  <rect x="17" y="17" width="66" height="66" rx="15" fill="white"/>
  <!-- L cursivo azul — haste vertical -->
  <rect x="31" y="26" width="10" height="36" rx="5" fill="#0100FE"/>
  <!-- base horizontal do L -->
  <rect x="31" y="54" width="32" height="9" rx="4.5" fill="#0100FE"/>
  <!-- swoosh curvo no canto inferior direito -->
  <path d="M59 63 Q72 63 72 50" stroke="#0100FE" stroke-width="5" stroke-linecap="round" fill="none"/>
</svg>
